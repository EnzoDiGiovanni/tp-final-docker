services:
  app:
    build: .
    depends_on:
      - db
    networks:
      - web
    environment:
      - DB_HOST=db
      - DB_DATABASE=tp_final_docker
      - DB_USERNAME=laravel
      - DB_PASSWORD=dockertestfinal
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build

  db:
    image: mysql:8.4
    restart: always
    environment:
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=dockertestfinal
      - MYSQL_ROOT_PASSWORD=dockertestfinal
      - MYSQL_DATABASE=tp_final_docker
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - web

  nginx:
    image: nginx
    ports:
      - "8081:80"
    depends_on:
      - app
    networks:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html

volumes:
  mysql:

networks:
  web:
